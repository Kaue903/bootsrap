<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Bootstrap</title>
    <!-- CSS do Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-3">

        <!-- Botão que abre o modal -->
        <!-- data-bs-toggle="modal" → diz ao Bootstrap que este botão abre um modal -->
        <!-- data-bs-target="#exemploModal" → aponta para o ID do modal que será aberto -->
        <button class="btn btn-danger" type="button" data-bs-toggle="modal" data-bs-target="#exemploModal">
            Abrir Modal
        </button>

        <!-- ESTRUTURA DO MODAL -->
        <!-- "modal fade" → "modal" ativa o componente, "fade" adiciona animação de entrada/saída -->
        <!-- tabindex="-1" → necessário para o Bootstrap gerenciar o foco corretamente -->
        <!-- aria-labelledby → aponta para o título do modal (acessibilidade) -->
        <!-- aria-hidden="true" → esconde do leitor de tela quando fechado -->
        <div class="modal fade" id="exemploModal" tabindex="-1" aria-labelledby="exemploModalLabel" aria-hidden="true">

            <!-- modal-dialog → centraliza e define o tamanho do modal na tela -->
            <div class="modal-dialog">

                <!-- modal-content → caixa branca visível, agrupa header, body e footer -->
                <div class="modal-content">

                    <!-- CABEÇALHO DO MODAL -->
                    <div class="modal-header">
                        <!-- id deve ser o mesmo valor do aria-labelledby lá de cima -->
                        <h5 class="modal-title" id="exemploModalLabel">Titulo do Modal</h5>

                        <!-- Botão X de fechar -->
                        <!-- data-bs-dismiss="modal" → fecha o modal ao clicar -->
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>

                    <!-- CORPO DO MODAL → onde fica o conteúdo principal -->
                    <div class="modal-body">
                        <p>Conteúdo do modal (Aqui)</p>
                    </div>

                    <!-- RODAPÉ DO MODAL → geralmente contém os botões de ação -->
                    <div class="modal-footer">
                        <!-- data-bs-dismiss="modal" → fecha o modal ao clicar -->
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="button" class="btn btn-primary">Salvar</button>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- JS do Bootstrap via CDN -->
    <!-- O "bundle" já inclui o Popper.js, necessário para modais e tooltips -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

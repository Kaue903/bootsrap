<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contato - Flamengo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-white">

    <!-- Nav Modal -->
         <!-- Header, Cabeçalho (camadas de navbar no Bootstrao) -->
     <nav class="navbar navbar-expand-lg navbar-light bg-secondary">
        <div class="container">
            <!-- Logo -->
             <a href="#" class="navbar-brand">
                <i class="bi bi-android2 text-light fs-1"></i>
             </a>

             <!-- Botão Menu Hamburguer -->
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#minhaNavbar">
                <span class="navbar-toggle-bi bi-list fs-2 text-light" style="filter: invert(0);"></span>
              </button>

             <!-- Links -->
              <div class="collapse navbar-collapse" id="minhaNavbar">
                  <div class="navbar-nav ms-auto">
                    <a href="#" class="navbar-link text-light m-3"><i class="bi bi-house text-light fs-3 pe-1"></i> Home</a>
                    <a href="#" class="navbar-link text-light m-3"><i class="bi bi-person text-light fs-3 pe-1"></i> Perfil</a>
                    <button class="btn btn-light ms-2" data-bs-toggle="modal" data-bs-target="#contatoModal">
                        <i class="bi bi-envelope me-1"></i>Contato
                    </button>
                  </div>
              </div>
        </div>
     </nav>

    <!-- Modal de Contato -->
    <div class="modal fade" id="contatoModal" tabindex="-1" aria-labelledby="contatoModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="contatoModalLabel">Entre em Contato</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <form class="needs-validation" novalidate>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="nome" placeholder="Seu nome completo" required>
                            <div class="invalid-feedback">Por favor, insira seu nome.</div>
                        </div>
                        <div class="mb-3">
                            <label for="emailContato" class="form-label">Email</label>
                            <input type="email" class="form-control" id="emailContato" placeholder="nome@exemplo.com" required>
                            <div class="invalid-feedback">Insira um e-mail válido.</div>
                        </div>
                        <div class="mb-3">
                            <label for="mensagem" class="form-label">Mensagem</label>
                            <textarea class="form-control" id="mensagem" rows="3" required></textarea>
                            <div class="invalid-feedback">Escreva uma breve mensagem.</div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="submit" class="btn border-black">Enviar Mensagem</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        (function () {
            'use strict'
            // Busca todos os formulários que queremos aplicar estilos de validação Bootstrap personalizados
            var forms = document.querySelectorAll('.needs-validation')

            // Faz um loop neles e evita o envio
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }

                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body>


    <div class="container d-flex justify-content-center mt-3">
        <button class="btn btn-primary border-dark p-3 ms-3">Azul</button>
        <button class="btn btn-danger border-dark p-3 ms-3">Perigo</button>
        <button class="btn btn-warning border-dark p-3 ms-3">Cuidado</button>
        <button class="btn btn-success border-dark p-3 ms-3">Sucesso</button>
        <button class="btn btn-secondary border-dark p-3 ms-3">Cinza</button>
        <button class="btn btn-info border-dark p-3 ms-3">Informação</button>
        <button class="btn btn-dark border-dark p-3 ms-3">Preto</button>
        <button class="btn btn-white border-dark p-3 ms-3">Branco</button>
    </div>
     
    <!-- Botão com Ícone -->
    <div class="container d-flex justify-content-center mt-3 ms-2 pe-5">
        <button class="btn btn-primary justify-content-center border-dark p-3 mt-3 ms-3">
            <i class="bi bi-search pe-2"></i>Pesquisar
        </button>

        <button class="btn btn-success justify-content-center border-dark p-3 mt-3 ms-3">
            <i class="bi bi-battery-charging pe-2"></i>Carregado
        </button>
        
        <button class="btn btn-secondary justify-content-center border-dark p-3 mt-3 ms-3">
            <i class="bi bi-backspace-fill pe-2"></i>Apagar
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
